<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bevaka ett läkemedel — {{ site_name }}</title>
  {% include "_design.html" %}
  <style>
    .med-main { max-width: 480px; margin: 0 auto; padding: 2rem 1.5rem; }
    .med-highlight { color: var(--cta); font-weight: 600; font-size: 0.92rem; margin: 0 0 1.1rem; }
    .med-error { background: #FBEAE6; border: 1px solid var(--stock-out); color: var(--stock-out); border-radius: 8px; padding: 0.65rem 0.9rem; font-size: 0.85rem; margin-bottom: 1rem; }
    .med-field { margin-bottom: 1.1rem; }
    .med-field label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--ink); margin-bottom: 0.4rem; }
    .med-input { width: 100%; padding: 0.65rem 0.8rem; border: 1.5px solid var(--line); border-radius: 8px; font-size: 0.95rem; font-family: inherit; background: #fff; color: var(--ink); }
    .med-input:focus { outline: none; border-color: var(--cta); }
    .med-consent { display: flex; gap: 0.6rem; align-items: flex-start; margin-bottom: 1.3rem; }
    .med-consent input[type="checkbox"] { margin-top: 0.2rem; flex-shrink: 0; width: 16px; height: 16px; accent-color: var(--cta); }
    .med-consent label { margin: 0; font-weight: 400; color: var(--muted); font-size: 0.8rem; line-height: 1.55; }
    .med-consent a { color: var(--cta); }
    .med-card button.med-cta { border: none; cursor: pointer; }
    .med-back { display: block; text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--muted); text-decoration: none; }
    .med-back:hover { color: var(--ink); }
  </style>
  {% include "_umami.html" %}
</head>
<body>
  {% set header_mode = 'minimal' %}
  {% include "_header.html" %}

  <main>
    <div class="med-main">
      <div class="card">
        <h1 class="med-h1">Meddela mig när det finns igen</h1>
        {% if med_name %}
        <p class="med-highlight">{{ med_name }}</p>
        {% endif %}

        {% if error %}
        <div class="med-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/subscribe" novalidate id="subscribe-form" data-med-name="{{ med_name }}">
          <input type="hidden" name="npl_pack_id" value="{{ npl_pack_id }}">

          <div class="med-field">
            <label for="email">E-postadress</label>
            <input class="med-input" type="email" id="email" name="email" placeholder="din@email.se"
                   autocomplete="email" required>
          </div>

          <div class="med-consent">
            <input type="checkbox" id="consent" name="consent" value="1">
            <label for="consent">
              Jag godkänner
              <a href="/privacy" target="_blank">integritetspolicyn</a>
              och samtycker till att {{ site_name }} behandlar min e-postadress och mitt
              läkemedelsval för att skicka lagernotiser. Jag kan när som helst avregistrera
              mig via länken i varje e-postmeddelande.
            </label>
          </div>

          <button type="submit" class="med-cta med-cta-full">Bevaka &rarr;</button>
        </form>
      </div>

      <a class="med-back" href="/">&larr; Tillbaka</a>
    </div>
  </main>
  <script>
  document.getElementById('subscribe-form').addEventListener('submit', function() {
    if (typeof umami !== 'undefined') {
      umami.track('prenumeration-skickad', { läkemedel: this.dataset.medName });
    }
  });
  </script>
</body>
</html>
