<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} — {{ site_name }}</title>
  {% include "_design.html" %}
  <style>
    .msg-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
    .msg-card { text-align: center; max-width: 480px; width: 100%; }
    .msg-icon { font-size: 3rem; margin-bottom: 1rem; line-height: 1; }
    .msg-card .med-p { text-align: center; }
  </style>
  {% include "_umami.html" %}
</head>
<body>
  {% set header_mode = 'minimal' %}
  {% include "_header.html" %}
  <main class="msg-main">
    <div class="card msg-card">
      <div class="msg-icon">{{ icon }}</div>
      <h1 class="med-h1">{{ title }}</h1>
      <p class="med-p">{{ message | safe }}</p>
      {% if cta_url %}
      <a class="med-cta" href="{{ cta_url }}">{{ cta_text }}</a>
      {% endif %}
    </div>
  </main>
  {% if umami_event %}
  <script>document.addEventListener('DOMContentLoaded', function() {
    if (typeof umami !== 'undefined') umami.track('{{ umami_event }}');
  });</script>
  {% endif %}
</body>
</html>
